name: Validate demo world

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE.md"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm test
