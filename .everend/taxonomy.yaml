specVersion: "0.1"
branch:
  id: fantasy-generic
  authoring: ai
  propertiesMode: template
  template: worldbuilding
types:
  universe:
    label: Universe
    description: The top-level continuity and its governing premise.
  character:
    label: Character
    description: A person or speaking actor in the continuity.
    properties:
      role:
        type: select
        options: [protagonist, ally, rival, antagonist, mentor]
      homeLocation:
        type: entityRef
        targetTypes: [location]
      affiliations:
        type: entityRefList
        targetTypes: [organization]
  creature:
    label: Creature
    description: A collectible, legendary, bureaucratic, or otherwise noteworthy nonhuman being.
    properties:
      temperament:
        type: select
        options: [docile, theatrical, officious, chaotic, unknowable]
      habitat:
        type: entityRef
        targetTypes: [location]
      abilities:
        type: multiSelect
        options: [spark, paperwork, flight, prophecy, mimicry, continuity]
  location:
    label: Location
    description: A city, institution, region, station, or narratively suspicious building.
    properties:
      region:
        type: text
      governingOrganization:
        type: entityRef
        targetTypes: [organization]
  organization:
    label: Organization
    description: A ministry, guild, union, studio, school, or heroic collective.
    properties:
      headquarters:
        type: entityRef
        targetTypes: [location]
      ideology:
        type: text
      relatedCharacters:
        type: entityRefList
        targetTypes: [character]
  item:
    label: Item
    description: A relic, credential, key, coupon, permit, or dangerous office supply.
    properties:
      rarity:
        type: select
        options: [common, regulated, rare, legendary, narratively-convenient]
      owner:
        type: entityRef
        targetTypes: [character, organization]
      relatedConcepts:
        type: entityRefList
        targetTypes: [concept]
  concept:
    label: Concept
    description: A metaphysical rule, genre convention, or continuity hazard.
    properties:
      riskLevel:
        type: select
        options: [low, moderate, high, finale-only]
      relatedEntities:
        type: entityRefList
  event:
    label: Event
    description: A historical occurrence in the shared canon.
    properties:
      era:
        type: text
      location:
        type: entityRef
        targetTypes: [location]
      participants:
        type: entityRefList
  story:
    label: Story
    description: A narrative container mirrored by a PathBranching workspace.
    properties:
      draftStatus:
        type: select
        options: [outline, draft, revised, final]
  scene:
    label: Scene
    description: A WorldNotion planning scene connected to runtime events.
    properties:
      location:
        type: entityRef
        targetTypes: [location]
      viewpointCharacter:
        type: entityRef
        targetTypes: [character]
      draftStatus:
        type: select
        options: [outline, draft, revised, final]
